apiVersion: v1
kind: Service
metadata:
  name: rabbitmq
  namespace: notifier
spec:
  type: NodePort
  ports:
    - name: amqp
      port: 5672
      targetPort: 5672
      nodePort: 30672
    - name: management
      port: 15672
      targetPort: 15672
      nodePort: 31672
    - name: prometheus
      port: 15692
      targetPort: 15692
      nodePort: 31692