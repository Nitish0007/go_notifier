apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - ../../base

patches:
  - target:
      version: v1
      kind: Service
      name: postgres
    patch: |-
      $patch: delete

  - target:
      group: apps
      version: v1
      kind: StatefulSet
      name: postgres
    patch: |-
      $patch: delete