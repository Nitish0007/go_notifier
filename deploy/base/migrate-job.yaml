apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: notifier
  labels:
    app.kubernetes.io/name: migrate
    app.kubernetes.io/part-of: go-notifier
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migrate
        app.kubernetes.io/part-of: go-notifier
    spec:
      restartPolicy: Never
      initContainers:
        - name: wait-for-postgres
          image: postgres:18-alpine
          command:
            - sh
            - -c
            - |
              until pg_isready -h postgres -p 5432 -U postgres; do
                echo "waiting for postgres..."
                sleep 2
              done
      containers:
        - name: migrate
          image: ghcr.io/nitish0007/go_notifier-migrate:latest
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - migrate -path /migrations -database "$DB_URL" up
          env:
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: notifier-secrets
                  key: DB_URL
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi