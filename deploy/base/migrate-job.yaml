apiVersion: batch/v1
kind: Job
metadata:
  name: migrate
  namespace: notifier
  labels:
    app.kubernetes.io/name: migrate
    app.kubernetes.io/part-of: go-notifier
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: migrate
        app.kubernetes.io/part-of: go-notifier
    spec:
      restartPolicy: Never
      # initContainers:
      #   - name: wait-for-postgres
      #     image: postgres:18-alpine
      #     command:
      #       - sh
      #       - -c
      #       - |
      #         until pg_isready -h "${DB_HOST}" -p 5432 -U postgres; do
      #           echo "waiting for postgres..."
      #           sleep 2
      #         done
      containers:
        - name: migrate
          image: ghcr.io/nitish0007/go_notifier-migrate:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: notifier-db-config
                  key: DB_HOST
            - name: DB_URL
              valueFrom:
                secretKeyRef:
                  name: notifier-secrets
                  key: DB_URL
          args:
            - "--port=5432"
            - "project-e16f63f5-6b93-48b8-a01:asia-south2:notifier-db"
            - "--auto-iam-authn"
          command:
            - sh
            - -c
            - |
              echo "waiting for db proxy..."
              until nc -z "${DB_HOST}" 5432; do
                sleep 1
              done
            - migrate -path /migrations -database "$DB_URL" up
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              memory: 128Mi