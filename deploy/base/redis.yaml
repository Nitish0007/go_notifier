apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: notifier
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: go-notifier
spec:
  type: ClusterIP
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
  selector:
    app.kubernetes.io/name: redis
---

apiVersion: v1
kind: PersistentVolumeClaim
metadata: 
  name: redis-data
  namespace: notifier
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: go-notifier
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: notifier
  labels:
    app.kubernetes.io/name: redis
    app.kubernetes.io/part-of: go-notifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        app.kubernetes.io/part-of: go-notifier
    spec:
      containers:
        - name: redis
          image: redis:8.4-alpine
          ports: 
            - containerPort: 6379
              name: redis
          command:
            - redis-server
            - --appendonly
            - "yes"
          volumeMounts:
            - name: redis-data
              mountPath: /data
          readinessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
      volumes:
        - name: redis-data
          persistentVolumeClaim:
            claimName: redis-data