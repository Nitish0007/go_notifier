apiVersion: apps/v1
kind: Deployment
metadata:
  name: workers
  namespace: notifier
  labels:
    app.kubernetes.io/name: workers
    app.kubernetes.io/part-of: go-notifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: workers
  template:
    metadata:
      labels:
        app.kubernetes.io/name: workers
        app.kubernetes.io/part-of: go-notifier
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: notifier-db-config
                  key: DB_HOST
          command:
            - sh
            - -c
            - |
              until nc -z redis 6379 && nc -z rabbitmq 5672; do
                echo "waiting for redis and rabbitmq..."
                sleep 2
              done
      containers:
        - name: workers
          image: ghcr.io/nitish0007/go_notifier-workers:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: notifier-secrets
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - kill -0 1
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi