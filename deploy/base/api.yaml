apiVersion: v1
kind: Service
metadata:
  name: api
  namespace: notifier
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: go-notifier
spec:
  type: ClusterIP
  ports:
    - name: http
      port: 8080
      targetPort: 8080
    - name: grpc
      port: 50051
      targetPort: 50051
  selector:
    app.kubernetes.io/name: api
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: notifier
  labels:
    app.kubernetes.io/name: api
    app.kubernetes.io/part-of: go-notifier
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: api
        app.kubernetes.io/part-of: go-notifier
    spec:
      initContainers:
        - name: wait-for-deps
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              until nc -z postgres 5432 && nc -z redis 6379 && nc -z rabbitmq 5672; do
                echo "waiting for redis and rabbitmq..."
                sleep 2
              done
      containers:
        - name: api
          image: ghcr.io/nitish0007/go_notifier-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
            - containerPort: 50051
              name: grpc
          envFrom:
            - secretRef:
                name: notifier-secrets
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              memory: 512Mi