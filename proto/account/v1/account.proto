syntax = "proto3";

package account.v1;
option go_package = "github.com/Nitish0007/go_notifier/pkg/gen/account/v1";
import "google/protobuf/timestamp.proto";

service AccountService {
  rpc Signup(SignupRequest) returns (SignupResponse);
  rpc Login(LoginRequest) returns (LoginResponse);
}

message SignupRequest {
  string email = 1;
  string password = 2;
  string confirm_password = 3;
  string first_name = 4;
  string last_name = 5;
}

message SignupResponse {
  int64 id = 1;
  string email = 2;
  string first_name = 3;
  string last_name = 4;
  google.protobuf.Timestamp created_at = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message LoginResponse {
  string auth_token = 1;
  int64 account_id = 2;
  string email = 3;
  string first_name = 4;
  string last_name = 5;
}