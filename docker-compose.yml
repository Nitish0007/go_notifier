services:
  notifier_db:
    image: postgres:18-alpine
    platform: linux/amd64
    networks:
      - notifier_network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      DB_URL: ${DB_URL}
    volumes:
      - postgres_data:/var/lib/postgresql
    healthcheck: # Wait for db_service to start, before making connection with db
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-notifier_db}"]
      interval: 5s
      retries: 5
    restart: unless-stopped

  notifier_redis:
    image: redis:8.4-alpine
    platform: linux/amd64
    networks:
      - notifier_network
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping"]
      interval: 5s
      retries: 5
    restart: unless-stopped
  
  notifier_rbmq:
    networks:
      - notifier_network
    build:
      context: .
      dockerfile: Dockerfile.rabbitmq
    platform: linux/amd64
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    environment:
      RABBITMQ_USER: ${RABBITMQ_USER}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
      - ./configs/rabbitmq/rabbitmq.conf:/etc/rabbitmq/rabbitmq.conf
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  notifier_migrate:
    image: notifier-migrate:latest
    build:
      context: .
      dockerfile: Dockerfile.migrate
    networks:
      - notifier_network
    environment:
      DATABASE_URL: ${DB_URL}
    command:
      [
        "-path", "/migrations",
        "-database", "${DB_URL}",
        "up"
      ]
    depends_on:
      notifier_db:
        condition: service_healthy
    restart: "no"

  notifier-api:
    platform: linux/amd64
    image: notifier-api:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: api
    networks:
      - notifier_network
    ports:
      - "8080:8080"
    environment:
      ENV: production
      DB_URL: ${DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      notifier_db:
        condition: service_healthy # wait for health check
      notifier_redis:
        condition: service_started
      notifier_rbmq:
        condition: service_healthy
    restart: unless-stopped

  notifier-workers:
    platform: linux/amd64
    image: notifier-workers:latest
    build:
      context: .
      dockerfile: Dockerfile
      target: workers
    networks:
      - notifier_network
    environment:
      ENV: production
      DB_URL: ${DB_URL}
      RABBITMQ_URL: ${RABBITMQ_URL}
      REDIS_URL: ${REDIS_URL}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    depends_on:
      notifier_db:
        condition: service_healthy # wait for health check
      notifier_redis:
        condition: service_healthy
      notifier_rbmq:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:

networks:
  notifier_network:
    driver: bridge

