name: Build and Push Docker images

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  build_and_push_images:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: api
          tags: |
            ghcr.io/nitish0007/go_notifier-api:latest
            ghcr.io/nitish0007/go_notifier-api:${{ github.sha }}
          push: true

      - name: Build and Push Workers image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          target: workers
          tags: |
            ghcr.io/nitish0007/go_notifier-workers:latest
            ghcr.io/nitish0007/go_notifier-workers:${{ github.sha }}
          push: true
      
      - name: Build and Push RabbitMQ image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.rabbitmq
          tags: |
            ghcr.io/nitish0007/go_notifier-rabbitmq:latest
            ghcr.io/nitish0007/go_notifier-rabbitmq:${{ github.sha }}
          push: true
      
      - name: Build and Push Migrate image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.migrate
          tags: |
            ghcr.io/nitish0007/go_notifier-migrate:latest
            ghcr.io/nitish0007/go_notifier-migrate:${{ github.sha }}
          push: true